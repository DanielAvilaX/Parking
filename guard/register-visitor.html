<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Registrar visitante | Registro de Vehículos Davinci</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Sora:wght@500;600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="/styles/base.css?v=20260511" />
    <link rel="stylesheet" href="/styles/components.css?v=20260511-logo-rect" />
    <link rel="stylesheet" href="/styles/pages.css?v=20260511-logo-rect" />
  </head>
  <body class="quick-page" data-scene="visitor-form">
    <div id="app-shell" class="page-shell">
      <main class="page-grid--narrow content-stack">
        <section class="hero-card">
          <div class="page-heading">
            <h1>Nuevo visitante</h1>
            <p>El sistema mostrará automáticamente los residentes y teléfonos del apartamento seleccionado.</p>
          </div>
        </section>
        <section class="panel">
          <form id="visitor-form" class="page-form">
            <div class="field-grid">
              <div class="field">
                <label for="visitor-plate">Placa</label>
                <input id="visitor-plate" name="plate" type="text" maxlength="7" placeholder="AAA-000" required />
              </div>
              <div class="field">
                <label for="visitor-name">Nombre del visitante</label>
                <input id="visitor-name" name="visitorName" type="text" required />
              </div>
            </div>
            <div class="field-grid">
              <div class="field">
                <label for="visitor-tower">Torre</label>
                <select id="visitor-tower" name="tower" required></select>
              </div>
              <div class="field">
                <label for="visitor-apartment">Apartamento</label>
                <select id="visitor-apartment" name="apartment" required></select>
              </div>
            </div>
            <section id="visitor-apartment-context" class="glass-card">
              <div class="page-heading">
                <h1>Contexto del apartamento</h1>
                <p>Selecciona primero torre y apartamento para ver residentes y teléfonos relacionados.</p>
              </div>
            </section>
            <div class="action-row">
              <button class="button" type="submit">Guardar visitante</button>
              <a class="button-ghost" href="/guard/index.html">Volver</a>
            </div>
          </form>
        </section>
      </main>
    </div>
    <div id="toast-root" class="toast-root" aria-live="polite"></div>
    <dialog id="app-modal" class="app-modal"></dialog>
    <script type="module" src="/js/pages/guard-register-visitor.page.js?v=20260511"></script>
  </body>
</html>
