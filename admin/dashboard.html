<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dashboard | Registro de Vehículos Davinci</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Sora:wght@500;600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="/styles/base.css?v=20260511" />
    <link rel="stylesheet" href="/styles/components.css?v=20260515-porteria-dashboard" />
    <link rel="stylesheet" href="/styles/pages.css?v=20260515-porteria-dashboard" />
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js" defer></script>
  </head>
  <body data-scene="admin-dashboard">
    <div id="app-shell" class="page-shell">
      <main class="page-container page-grid page-grid--admin">
        <section class="hero-card">
          <div class="page-heading">
            <h1>Dashboard de portería</h1>
            <p>Consulta movimientos de visitantes y residentes, actividad de pedidos, contactos y alertas operativas.</p>
          </div>
        </section>
        <section class="panel">
          <div class="field-grid">
            <div class="field">
              <label for="dashboard-date-from">Desde</label>
              <input id="dashboard-date-from" type="date" />
            </div>
            <div class="field">
              <label for="dashboard-date-to">Hasta</label>
              <input id="dashboard-date-to" type="date" />
            </div>
            <div class="field">
              <label for="dashboard-granularity">Agrupación</label>
              <select id="dashboard-granularity">
                <option value="day">Por día</option>
                <option value="range">Resumen del rango</option>
              </select>
            </div>
            <div class="field">
              <label>&nbsp;</label>
              <button id="dashboard-refresh" class="button button-wide" type="button">Actualizar métricas</button>
            </div>
          </div>
        </section>
        <section id="dashboard-metrics" class="grid-auto"></section>
        <section class="split-card">
          <article class="panel chart-card">
            <div class="section-title">
              <h2>Movimientos operativos</h2>
              <span class="helper-text">Visitantes y residentes</span>
            </div>
            <div class="chart-frame">
              <canvas id="traffic-chart"></canvas>
            </div>
          </article>
          <article class="panel chart-card">
            <div class="section-title">
              <h2>Estado actual</h2>
              <span class="helper-text">Activos, pedidos y alertas</span>
            </div>
            <div class="chart-frame">
              <canvas id="status-chart"></canvas>
            </div>
          </article>
        </section>
      </main>
    </div>
    <div id="toast-root" class="toast-root" aria-live="polite"></div>
    <dialog id="app-modal" class="app-modal"></dialog>
    <script type="module" src="/js/pages/admin-dashboard.page.js?v=20260515-phase1e"></script>
  </body>
</html>
