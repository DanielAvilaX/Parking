<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Residentes | Registro de Vehículos Davinci</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Sora:wght@500;600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="/styles/base.css?v=20260511" />
    <link rel="stylesheet" href="/styles/components.css?v=20260514-porteria" />
    <link rel="stylesheet" href="/styles/pages.css?v=20260514-porteria" />
  </head>
  <body data-scene="admin-residents">
    <div id="app-shell" class="page-shell">
      <main class="page-container page-grid page-grid--admin">
        <section class="hero-card">
          <div class="page-heading">
            <h1>Residentes registrados</h1>
            <p>Vista inicial del administrador con filtros por torre, propietario, apartamento, placa y teléfono.</p>
          </div>
        </section>
        <section class="panel filters-panel">
          <div class="field-grid">
            <div class="field">
              <label for="resident-filter-tower">Torre</label>
              <select id="resident-filter-tower"></select>
            </div>
            <div class="field">
              <label for="resident-filter-owner">Propietario</label>
              <input id="resident-filter-owner" type="text" placeholder="Nombre del residente" />
            </div>
            <div class="field">
              <label for="resident-filter-apartment">Apartamento</label>
              <input id="resident-filter-apartment" type="text" placeholder="Ej. 304" />
            </div>
            <div class="field">
              <label for="resident-filter-plate">Placa</label>
              <input id="resident-filter-plate" type="text" placeholder="AAA-000" />
            </div>
            <div class="field">
              <label for="resident-filter-phone">Teléfono</label>
              <input id="resident-filter-phone" type="text" placeholder="Número registrado" />
            </div>
          </div>
        </section>
        <section id="resident-admin-list" class="record-list"></section>
      </main>
    </div>
    <div id="toast-root" class="toast-root" aria-live="polite"></div>
    <dialog id="app-modal" class="app-modal"></dialog>
    <script type="module" src="/js/pages/admin-residents.page.js?v=20260514-phase1d"></script>
  </body>
</html>
